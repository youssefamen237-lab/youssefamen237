name: Karma Vault Stories — Daily Autonomous Pipeline

on:
  schedule:
    # Runs daily at 06:00 UTC — adjust to preferred publish window
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_pillar:
        description: 'Force a specific content pillar (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate content but skip YouTube upload'
        required: false
        default: 'false'

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      # AI / Writing
      GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY:               ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_KEY:             ${{ secrets.OPENROUTER_KEY }}
      OPENAI_API_KEY:             ${{ secrets.OPENAI_API_KEY }}

      # TTS / Voice
      ELEVEN_API_KEY:             ${{ secrets.ELEVEN_API_KEY }}
      ELEVENLABS_VOICE_ID_MALE:   ${{ secrets.ELEVENLABS_VOICE_ID_MALE }}
      ELEVENLABS_VOICE_ID_FEMALE: ${{ secrets.ELEVENLABS_VOICE_ID_FEMALE }}
      CAMB_AI_KEY_1:              ${{ secrets.CAMB_AI_KEY_1 }}
      DEEPGRAM_API_KEY:           ${{ secrets.DEEPGRAM_API_KEY }}
      ASSEMBLYAI:                 ${{ secrets.ASSEMBLYAI }}

      # Visual / Stock
      PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY:            ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_ACCESS_KEY:        ${{ secrets.UNSPLASH_ACCESS_KEY }}
      UNSPLASH_ID:                ${{ secrets.UNSPLASH_ID }}
      UNSPLASH_SECRET_KEY:        ${{ secrets.UNSPLASH_SECRET_KEY }}
      FREEPIK_API_KEY:            ${{ secrets.FREEPIK_API_KEY }}
      GETIMG_API_KEY:             ${{ secrets.GETIMG_API_KEY }}
      REPLICATE_API_TOKEN:        ${{ secrets.REPLICATE_API_TOKEN }}
      HF_API_TOKEN:               ${{ secrets.HF_API_TOKEN }}
      COVERR_API_ID:              ${{ secrets.COVERR_API_ID }}
      COVERR_API_KEY:             ${{ secrets.COVERR_API_KEY }}
      VECTEEZY_ID:                ${{ secrets.VECTEEZY_ID }}
      VECTEEZY_SECRET_KEY:        ${{ secrets.VECTEEZY_SECRET_KEY }}
      INTERNET_ARCHIVE_ACCESS_KEY: ${{ secrets.INTERNET_ARCHIVE_ACCESS_KEY }}
      INTERNET_ARCHIVE_SECRET_KEY: ${{ secrets.INTERNET_ARCHIVE_SECRET_KEY }}
      NASA_API_KEY:               ${{ secrets.NASA_API_KEY }}
      REMOVE_BG_API:              ${{ secrets.REMOVE_BG_API }}

      # Search / Trend
      SERPAPI:                    ${{ secrets.SERPAPI }}
      TAVILY_API_KEY:             ${{ secrets.TAVILY_API_KEY }}
      ZENSERP:                    ${{ secrets.ZENSERP }}
      NEWS_API:                   ${{ secrets.NEWS_API }}
      FREESOUND_API:              ${{ secrets.FREESOUND_API }}
      FREESOUND_ID:               ${{ secrets.FREESOUND_ID }}

      # YouTube — three credential packs
      YOUTUBE_API_KEY:            ${{ secrets.YOUTUBE_API_KEY }}
      YT_CHANNEL_ID:              ${{ secrets.YT_CHANNEL_ID }}
      YT_CLIENT_ID_1:             ${{ secrets.YT_CLIENT_ID_1 }}
      YT_CLIENT_SECRET_1:         ${{ secrets.YT_CLIENT_SECRET_1 }}
      YT_REFRESH_TOKEN_1:         ${{ secrets.YT_REFRESH_TOKEN_1 }}
      YT_CLIENT_ID_2:             ${{ secrets.YT_CLIENT_ID_2 }}
      YT_CLIENT_SECRET_2:         ${{ secrets.YT_CLIENT_SECRET_2 }}
      YT_REFRESH_TOKEN_2:         ${{ secrets.YT_REFRESH_TOKEN_2 }}
      YT_CLIENT_ID_3:             ${{ secrets.YT_CLIENT_ID_3 }}
      YT_CLIENT_SECRET_3:         ${{ secrets.YT_CLIENT_SECRET_3 }}
      YT_REFRESH_TOKEN_3:         ${{ secrets.YT_REFRESH_TOKEN_3 }}

      # Pipeline control
      FORCE_PILLAR:               ${{ github.event.inputs.force_pillar }}
      DRY_RUN:                    ${{ github.event.inputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (FFmpeg, fonts, image libs)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu-core \
            libmagic1 \
            imagemagick \
            python3-pil \
            python3-pil.imagetk
          echo "FFmpeg version: $(ffmpeg -version | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore persistent data (story bank, analytics, heuristics)
        uses: actions/cache@v4
        with:
          path: |
            data/story_bank
            data/analytics
            data/heuristics
          key: kvs-data-${{ github.run_number }}
          restore-keys: |
            kvs-data-

      - name: Restore emergency export directory
        uses: actions/cache@v4
        with:
          path: data/emergency_export
          key: kvs-emergency-${{ github.run_number }}
          restore-keys: |
            kvs-emergency-

      - name: Run autonomous media pipeline
        run: python main_pipeline.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"

      - name: Upload run logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Upload emergency exports as artifact (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emergency-export-${{ github.run_number }}
          path: data/emergency_export/
          retention-days: 7
          if-no-files-found: ignore

      - name: Save updated persistent data
        uses: actions/cache@v4
        if: always()
        with:
          path: |
            data/story_bank
            data/analytics
            data/heuristics
          key: kvs-data-${{ github.run_number }}

      - name: Save updated emergency export
        uses: actions/cache@v4
        if: always()
        with:
          path: data/emergency_export
          key: kvs-emergency-${{ github.run_number }}
