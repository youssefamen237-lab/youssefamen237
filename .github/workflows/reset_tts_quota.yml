name: Reset TTS Quota

on:
  workflow_dispatch:
    inputs:
      key:
        description: "Specific key index to reset (1-3). Leave blank to reset all three."
        required: false
        type: string

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reset TTS quota counters
        env:
          REDIS_CACHE: ${{ secrets.REDIS_CACHE }}
        run: |
          if [ -n "${{ inputs.key }}" ]; then
            python scripts/reset_tts_quota.py --key "${{ inputs.key }}"
          else
            python scripts/reset_tts_quota.py
          fi
