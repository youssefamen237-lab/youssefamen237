name: Bootstrap Seed Data

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-run seeding even if already initialized"
        required: false
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run bootstrap
        env:
          SUPABASE: ${{ secrets.SUPABASE }}
          REDIS_CACHE: ${{ secrets.REDIS_CACHE }}
          ACCOUNT_ID_CLOUDFLARE_R2: ${{ secrets.ACCOUNT_ID_CLOUDFLARE_R2 }}
          S3_API_CLOUDFLARE_R2: ${{ secrets.S3_API_CLOUDFLARE_R2 }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          TOGETHER_AI: ${{ secrets.TOGETHER_AI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FREESOUND_API: ${{ secrets.FREESOUND_API }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m bootstrap.initial_setup --force
          else
            python -m bootstrap.initial_setup
          fi
