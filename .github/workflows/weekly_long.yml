# .github/workflows/weekly_long.yml
# ============================================================
# MindCraft Psychology — Weekly Long Compilation Pipeline
# Runs once per week: Sunday at 10:00 AM EST (15:00 UTC).
# A random sleep of 1–10 minutes is applied before the script.
# ============================================================

name: Weekly Compilation Pipeline

on:
  schedule:
    # Sunday 10:00 AM EST = Sunday 15:00 UTC
    - cron: "0 15 * * 0"

  # Manual trigger for testing / re-runs
  workflow_dispatch:
    inputs:
      max_clips:
        description: "Max Short clips to include (default: 28)"
        required: false
        default: "28"
      dry_run:
        description: "Dry run (skip upload)? true | false"
        required: false
        default: "false"
      privacy:
        description: "Privacy status: public | unlisted | private"
        required: false
        default: "public"

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-compilation:
    name: Compile & Upload Weekly Video
    runs-on: ubuntu-latest
    timeout-minutes: 90       # compilations take longer than single Shorts

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── 3. Install FFmpeg ────────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 4. Install Python dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Restore SQLite database cache ─────────────────────────────────
      #    Must use the same cache key prefix as daily_shorts.yml so
      #    the weekly job sees the DB written by the daily jobs.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}
          restore-keys: |
            mindcraft-db-

      # ── 6. Restore OAuth token cache ─────────────────────────────────────
      - name: Restore OAuth token cache
        uses: actions/cache@v4
        with:
          path: .tokens/
          key: mindcraft-tokens-${{ github.run_id }}
          restore-keys: |
            mindcraft-tokens-

      # ── 7. Restore rendered Shorts cache ─────────────────────────────────
      #    The compilation needs the .mp4 files produced by the daily jobs.
      #    Daily jobs must cache output/shorts/ for this step to work.
      - name: Restore Shorts video cache
        uses: actions/cache@v4
        with:
          path: output/shorts/
          key: mindcraft-shorts-${{ github.run_id }}
          restore-keys: |
            mindcraft-shorts-

      # ── 8. Hydrate YouTube OAuth tokens from Secrets ─────────────────────
      - name: Write OAuth tokens from secrets
        env:
          YT_TOKEN_JSON_1: ${{ secrets.YT_TOKEN_JSON_1 }}
          YT_TOKEN_JSON_2: ${{ secrets.YT_TOKEN_JSON_2 }}
          YT_TOKEN_JSON_3: ${{ secrets.YT_TOKEN_JSON_3 }}
        run: |
          mkdir -p .tokens
          if [ -n "$YT_TOKEN_JSON_1" ]; then
            echo "$YT_TOKEN_JSON_1" | base64 -d > .tokens/token_1.json
          fi
          if [ -n "$YT_TOKEN_JSON_2" ]; then
            echo "$YT_TOKEN_JSON_2" | base64 -d > .tokens/token_2.json
          fi
          if [ -n "$YT_TOKEN_JSON_3" ]; then
            echo "$YT_TOKEN_JSON_3" | base64 -d > .tokens/token_3.json
          fi

      # ── 9. Download Bebas Neue font ───────────────────────────────────────
      - name: Download Bebas Neue font
        run: |
          mkdir -p assets/fonts
          if [ ! -f assets/fonts/BebasNeue-Regular.ttf ]; then
            curl -fsSL \
              "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BebasNeue(2018)ByDhamraType/ttf/BebasNeue-Regular.ttf" \
              -o assets/fonts/BebasNeue-Regular.ttf
          fi

      # ── 10. Create output directories ────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p output/shorts output/compilations logs

      # ── 11. ANTI-BOT: Random sleep (1–10 minutes) ────────────────────────
      - name: Random sleep (anti-bot jitter)
        run: |
          SLEEP_SECS=$(( RANDOM % 540 + 60 ))   # 60–600 seconds (1–10 min)
          echo "Sleeping ${SLEEP_SECS}s before pipeline start …"
          sleep "$SLEEP_SECS"

      # ── 12. Validate environment variables ────────────────────────────────
      - name: Validate environment
        env:
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_TOKEN_PATH_1:    .tokens/token_1.json
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_TOKEN_PATH_2:    .tokens/token_2.json
          YT_CLIENT_SECRET_3: ${{ secrets.YT_CLIENT_SECRET_3 }}
          YT_TOKEN_PATH_3:    .tokens/token_3.json
          DB_PATH:            database/mindcraft.db
          LOG_LEVEL:          INFO
          CHANNEL_NICHE:      "psychology facts"
          CHANNEL_VOICE:      "en-US-GuyNeural"
        run: python main.py --mode validate

      # ── 13. Run the weekly compilation pipeline ───────────────────────────
      - name: Run weekly compilation pipeline
        env:
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_TOKEN_PATH_1:    .tokens/token_1.json
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_TOKEN_PATH_2:    .tokens/token_2.json
          YT_CLIENT_SECRET_3: ${{ secrets.YT_CLIENT_SECRET_3 }}
          YT_TOKEN_PATH_3:    .tokens/token_3.json
          DB_PATH:            database/mindcraft.db
          LOG_LEVEL:          INFO
          CHANNEL_NICHE:      "psychology facts"
          CHANNEL_VOICE:      "en-US-GuyNeural"
          DAILY_SHORTS_COUNT: "4"
        run: |
          MAX_CLIPS="${{ github.event.inputs.max_clips || '28' }}"
          PRIVACY="${{ github.event.inputs.privacy || 'public' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python main.py --mode weekly --max-clips $MAX_CLIPS --privacy $PRIVACY"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          $CMD

      # ── 14. Upload logs artifact ─────────────────────────────────────────
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14

      # ── 15. Upload compilation video as artifact (dry-run review) ─────────
      - name: Upload compilation video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compilation-${{ github.run_id }}
          path: output/compilations/
          retention-days: 3

      # ── 16. Save updated DB cache ─────────────────────────────────────────
      - name: Save database cache
        if: always()
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}

      # ── 17. Save updated token cache ──────────────────────────────────────
      - name: Save OAuth token cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .tokens/
          key: mindcraft-tokens-${{ github.run_id }}
