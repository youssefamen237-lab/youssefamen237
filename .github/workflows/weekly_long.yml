# .github/workflows/weekly_long.yml
name: Weekly Compilation Pipeline

on:
  schedule:
    - cron: "0 15 * * 0"

  workflow_dispatch:
    inputs:
      max_clips:
        description: "Max Short clips to include (default: 28)"
        required: false
        default: "28"
      dry_run:
        description: "Dry run (skip upload)? true | false"
        required: false
        default: "false"
      privacy:
        description: "Privacy status: public | unlisted | private"
        required: false
        default: "public"

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-compilation:
    name: Compile & Upload Weekly Video
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}
          restore-keys: |
            mindcraft-db-

      - name: Restore Shorts video cache
        uses: actions/cache@v4
        with:
          path: output/shorts/
          key: mindcraft-shorts-${{ github.run_id }}
          restore-keys: |
            mindcraft-shorts-

      - name: Download Bebas Neue font
        run: |
          mkdir -p assets/fonts
          if [ ! -f assets/fonts/BebasNeue-Regular.ttf ]; then
            curl -fsSL "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BebasNeue(2018)ByDhamraType/ttf/BebasNeue-Regular.ttf" -o assets/fonts/BebasNeue-Regular.ttf
          fi

      - name: Create output directories
        run: mkdir -p output/shorts output/compilations logs

      - name: Random sleep (anti-bot jitter)
        run: |
          SLEEP_SECS=$(( RANDOM % 540 + 60 ))
          echo "Sleeping ${SLEEP_SECS}s before pipeline start …"
          sleep "$SLEEP_SECS"

      - name: Run weekly compilation pipeline
        env:
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID_1:     ${{ secrets.YT_CLIENT_ID_1 }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_REFRESH_TOKEN_1: ${{ secrets.YT_REFRESH_TOKEN_1 }}
          DB_PATH:            database/mindcraft.db
          LOG_LEVEL:          INFO
          CHANNEL_NICHE:      "psychology facts"
          CHANNEL_VOICE:      "en-US-GuyNeural"
          DAILY_SHORTS_COUNT: "4"
        run: |
          MAX_CLIPS="${{ github.event.inputs.max_clips || '28' }}"
          PRIVACY="${{ github.event.inputs.privacy || 'public' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python main.py --mode weekly --max-clips $MAX_CLIPS --privacy $PRIVACY"
          if [ "$DRY_RUN" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD"
          $CMD

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14

      - name: Upload compilation video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compilation-${{ github.run_id }}
          path: output/compilations/
          retention-days: 3

      - name: Save database cache
        if: always()
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}
