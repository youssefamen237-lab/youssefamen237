# .github/workflows/daily_shorts.yml
# ============================================================
# MindCraft Psychology — Daily Shorts Pipeline
# Runs 4× per day at 12 PM, 3 PM, 6 PM, and 9 PM EST (UTC-5).
# A random sleep of 1–15 minutes is injected before the Python
# script to prevent uploads at the exact same second every day.
# ============================================================

name: Daily Shorts Pipeline

on:
  schedule:
    # Times are UTC. EST = UTC-5, so:
    #   12:00 PM EST = 17:00 UTC
    #    3:00 PM EST = 20:00 UTC
    #    6:00 PM EST = 23:00 UTC
    #    9:00 PM EST = 02:00 UTC (next day)
    - cron: "0 17 * * *"
    - cron: "0 20 * * *"
    - cron: "0 23 * * *"
    - cron: "0  2 * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      count:
        description: "Number of Shorts to generate (default: 4)"
        required: false
        default: "4"
      dry_run:
        description: "Dry run (skip upload)? true | false"
        required: false
        default: "false"
      privacy:
        description: "Privacy status: public | unlisted | private"
        required: false
        default: "public"

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-shorts:
    name: Generate & Upload Shorts
    runs-on: ubuntu-latest
    timeout-minutes: 60       # hard ceiling — prevents runaway jobs

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── 3. Install system dependencies (FFmpeg for MoviePy) ──────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 4. Install Python dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Restore SQLite database cache ─────────────────────────────────
      #    Persists the dedup DB across runs so scripts are never repeated.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}
          restore-keys: |
            mindcraft-db-

      # ── 6. Restore OAuth token cache ─────────────────────────────────────
      - name: Restore OAuth token cache
        uses: actions/cache@v4
        with:
          path: .tokens/
          key: mindcraft-tokens-${{ github.run_id }}
          restore-keys: |
            mindcraft-tokens-

      # ── 7. Hydrate YouTube OAuth tokens from Secrets ─────────────────────
      #    Tokens are stored as base64-encoded JSON in GitHub Secrets.
      #    auth.py reads YT_TOKEN_JSON_N and writes .tokens/token_N.json.
      - name: Write OAuth tokens from secrets
        env:
          YT_TOKEN_JSON_1: ${{ secrets.YT_TOKEN_JSON_1 }}
          YT_TOKEN_JSON_2: ${{ secrets.YT_TOKEN_JSON_2 }}
          YT_TOKEN_JSON_3: ${{ secrets.YT_TOKEN_JSON_3 }}
        run: |
          mkdir -p .tokens
          # Decode and write each token if the secret is set
          if [ -n "$YT_TOKEN_JSON_1" ]; then
            echo "$YT_TOKEN_JSON_1" | base64 -d > .tokens/token_1.json
            echo "Token 1 written."
          fi
          if [ -n "$YT_TOKEN_JSON_2" ]; then
            echo "$YT_TOKEN_JSON_2" | base64 -d > .tokens/token_2.json
            echo "Token 2 written."
          fi
          if [ -n "$YT_TOKEN_JSON_3" ]; then
            echo "$YT_TOKEN_JSON_3" | base64 -d > .tokens/token_3.json
            echo "Token 3 written."
          fi

      # ── 8. Download Bebas Neue font ───────────────────────────────────────
      - name: Download Bebas Neue font
        run: |
          mkdir -p assets/fonts
          if [ ! -f assets/fonts/BebasNeue-Regular.ttf ]; then
            curl -fsSL \
              "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BebasNeue(2018)ByDhamraType/ttf/BebasNeue-Regular.ttf" \
              -o assets/fonts/BebasNeue-Regular.ttf
            echo "Font downloaded."
          fi

      # ── 9. Create output directories ─────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p output/audio output/clips output/shorts output/compilations logs

      # ── 10. ANTI-BOT: Random sleep (1–15 minutes) ────────────────────────
      #    Prevents uploads at the exact same second every day.
      #    Sleep is randomised per-run in the shell so GitHub Actions
      #    schedule jitter is layered on top of our own jitter.
      - name: Random sleep (anti-bot jitter)
        run: |
          SLEEP_SECS=$(( RANDOM % 840 + 60 ))   # 60–900 seconds (1–15 min)
          echo "Sleeping ${SLEEP_SECS}s before pipeline start …"
          sleep "$SLEEP_SECS"

      # ── 11. Validate environment variables ────────────────────────────────
      - name: Validate environment
        env:
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:   ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_TOKEN_PATH_1:   .tokens/token_1.json
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_TOKEN_PATH_2:   .tokens/token_2.json
          YT_CLIENT_SECRET_3: ${{ secrets.YT_CLIENT_SECRET_3 }}
          YT_TOKEN_PATH_3:   .tokens/token_3.json
          DB_PATH:           database/mindcraft.db
          LOG_LEVEL:         INFO
          DAILY_SHORTS_COUNT: "4"
          CHANNEL_NICHE:     "psychology facts"
          CHANNEL_VOICE:     "en-US-GuyNeural"
        run: python main.py --mode validate

      # ── 12. Run the Short pipeline ────────────────────────────────────────
      - name: Run Short pipeline
        env:
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:   ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_TOKEN_PATH_1:   .tokens/token_1.json
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_TOKEN_PATH_2:   .tokens/token_2.json
          YT_CLIENT_SECRET_3: ${{ secrets.YT_CLIENT_SECRET_3 }}
          YT_TOKEN_PATH_3:   .tokens/token_3.json
          DB_PATH:           database/mindcraft.db
          LOG_LEVEL:         INFO
          DAILY_SHORTS_COUNT: ${{ github.event.inputs.count || '4' }}
          CHANNEL_NICHE:     "psychology facts"
          CHANNEL_VOICE:     "en-US-GuyNeural"
        run: |
          COUNT="${{ github.event.inputs.count || '4' }}"
          PRIVACY="${{ github.event.inputs.privacy || 'public' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python main.py --mode short --count $COUNT --privacy $PRIVACY"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          $CMD

      # ── 13. Save pipeline logs as artifact ───────────────────────────────
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      # ── 14. Save updated DB cache ─────────────────────────────────────────
      - name: Save database cache
        if: always()
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}

      # ── 15. Save updated token cache ──────────────────────────────────────
      - name: Save OAuth token cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .tokens/
          key: mindcraft-tokens-${{ github.run_id }}
