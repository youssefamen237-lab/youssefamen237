# .github/workflows/daily_shorts.yml
name: Daily Shorts Pipeline

on:
  schedule:
    - cron: "0 17 * * *"
    - cron: "0 20 * * *"
    - cron: "0 23 * * *"
    - cron: "0  2 * * *"

  workflow_dispatch:
    inputs:
      count:
        description: "Number of Shorts to generate (default: 4)"
        required: false
        default: "4"
      dry_run:
        description: "Dry run (skip upload)? true | false"
        required: false
        default: "false"
      privacy:
        description: "Privacy status: public | unlisted | private"
        required: false
        default: "public"

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-shorts:
    name: Generate & Upload Shorts
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}
          restore-keys: |
            mindcraft-db-

      - name: Create output directories
        run: mkdir -p output/audio output/clips output/shorts output/compilations logs

      # Restore previous shorts so we don't lose them between runs
      - name: Restore Shorts video cache
        uses: actions/cache@v4
        with:
          path: output/shorts/
          key: mindcraft-shorts-${{ github.run_id }}
          restore-keys: |
            mindcraft-shorts-

      - name: Download Bebas Neue font
        run: |
          mkdir -p assets/fonts
          if [ ! -f assets/fonts/BebasNeue-Regular.ttf ]; then
            curl -fsSL "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BebasNeue(2018)ByDhamraType/ttf/BebasNeue-Regular.ttf" -o assets/fonts/BebasNeue-Regular.ttf
          fi

      - name: Random sleep (anti-bot jitter)
        run: |
          SLEEP_SECS=$(( RANDOM % 840 + 60 ))
          echo "Sleeping ${SLEEP_SECS}s before pipeline start …"
          sleep "$SLEEP_SECS"

      - name: Run Short pipeline
        env:
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID_1:     ${{ secrets.YT_CLIENT_ID_1 }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_REFRESH_TOKEN_1: ${{ secrets.YT_REFRESH_TOKEN_1 }}
          DB_PATH:            database/mindcraft.db
          LOG_LEVEL:          INFO
          DAILY_SHORTS_COUNT: ${{ github.event.inputs.count || '4' }}
          CHANNEL_NICHE:      "psychology facts"
          CHANNEL_VOICE:      "en-US-GuyNeural"
        run: |
          COUNT="${{ github.event.inputs.count || '4' }}"
          PRIVACY="${{ github.event.inputs.privacy || 'public' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python main.py --mode short --count $COUNT --privacy $PRIVACY"
          if [ "$DRY_RUN" = "true" ]; then CMD="$CMD --dry-run"; fi
          echo "Running: $CMD"
          $CMD

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Save database cache
        if: always()
        uses: actions/cache@v4
        with:
          path: database/mindcraft.db
          key: mindcraft-db-${{ github.run_id }}

      # Save the newly generated shorts for the weekly compiler
      - name: Save Shorts video cache
        if: always()
        uses: actions/cache@v4
        with:
          path: output/shorts/
          key: mindcraft-shorts-${{ github.run_id }}
