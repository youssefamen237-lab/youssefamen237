name: Daily Publishing

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run publishing batch
        env:
          SUPABASE: ${{ secrets.SUPABASE }}
          REDIS_CACHE: ${{ secrets.REDIS_CACHE }}
          ACCOUNT_ID_CLOUDFLARE_R2: ${{ secrets.ACCOUNT_ID_CLOUDFLARE_R2 }}
          S3_API_CLOUDFLARE_R2: ${{ secrets.S3_API_CLOUDFLARE_R2 }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API }}
          YT_CLIENT_ID_1: ${{ secrets.YT_CLIENT_ID_1 }}
          YT_CLIENT_SECRET_1: ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_REFRESH_TOKEN_1: ${{ secrets.YT_REFRESH_TOKEN_1 }}
          YT_CLIENT_ID_2: ${{ secrets.YT_CLIENT_ID_2 }}
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_REFRESH_TOKEN_2: ${{ secrets.YT_REFRESH_TOKEN_2 }}
          YT_CLIENT_ID_3: ${{ secrets.YT_CLIENT_ID_3 }}
          YT_CLIENT_SECRET_3: ${{ secrets.YT_CLIENT_SECRET_3 }}
          YT_REFRESH_TOKEN_3: ${{ secrets.YT_REFRESH_TOKEN_3 }}
        run: |
          python << 'PYEOF'
          import json, sys
          from dataclasses import asdict
          from pipelines.batch_runner import get_batch_runner

          summary = get_batch_runner().run_publishing_batch()
          print(json.dumps(asdict(summary), default=str, indent=2))

          for err in summary.errors:
              print(f"::warning::{err}")

          total_published = summary.shorts_published + summary.long_published
          if summary.errors and total_published == 0:
              print("::error::Publishing batch failed with no successful uploads.")
              sys.exit(1)
          PYEOF
